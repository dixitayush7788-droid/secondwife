<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECOND WIFE | Kitchen Dashboard (Elite Live Sync)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Playfair+Display+SC:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; }
        .brand-font { font-family: 'Playfair Display SC', serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card-popup { background: rgba(9, 15, 30, 0.95); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes emergencyRedGlow {
            0%, 100% { box-shadow: 0 0 12px #ef4444, inset 0 0 6px #ef4444; border-color: #f87171; opacity: 0.7; }
            50% { box-shadow: 0 0 30px #dc2626, inset 0 0 15px #dc2626; border-color: #f87171; opacity: 1; }
        }
        .kitchen-red-beacon { animation: emergencyRedGlow 1.2s infinite ease-in-out; border: 2px solid #ef4444; background: rgba(239, 68, 68, 0.15) !important; }
        .red-dot-beacon { width: 10px; height: 10px; background-color: #ef4444; box-shadow: 0 0 10px #ef4444; border-radius: 9999px; display: inline-block; animation: emergencyRedGlow 1.2s infinite ease-in-out; }
        
        /* PULSING BLUE GLOW FOR OUTBOUND CUSTOMER MESSAGES */
        @keyframes messagePulseGlowNode {
            0%, 100% { border-color: rgba(59, 130, 246, 0.3); box-shadow: 0 0 8px rgba(59, 130, 246, 0.1); }
            50% { border-color: rgba(59, 130, 246, 0.8); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        }
        .incoming-msg-radar-glow { animation: messagePulseGlowNode 1.4s infinite ease-in-out; background: rgba(30, 58, 138, 0.25) !important; }

        /* PULSING NEON BLUE LINK MODULE FOR DYNAMIC MAPS OVERLAY */
        @keyframes mapGlowPulseActionNode {
            0%, 100% { box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(59, 130, 246, 0.6); border-color: rgba(96, 165, 250, 0.8); }
        }
        .dynamic-map-btn-neon { animation: mapGlowPulseActionNode 1.8s infinite ease-in-out; }
    </style>
</head>
<body class="text-slate-100 min-h-screen antialiased pb-24">

    <audio id="kitchen-alert-bell" loop preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-84.wav" type="audio/wav">
    </audio>

    <header class="sticky top-0 z-50 bg-[#030712]/90 backdrop-blur-md border-b border-white/[0.05] px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 shadow-xl">
        <div class="flex flex-col text-center sm:text-left">
            <h1 class="brand-font text-white text-2xl font-black tracking-tight">Second Wife</h1>
            <span class="text-[9px] font-black text-orange-500 uppercase tracking-widest mt-1">Kitchen Command Center</span>
        </div>
        <div class="flex gap-2">
            <button onclick="openStockModalNode()" class="bg-gradient-to-r from-orange-500 to-red-600 text-black font-extrabold text-xs px-4 py-2.5 rounded-xl flex items-center gap-2 transition active:scale-95 shadow-md">
                <i class="fa-solid fa-layer-group"></i> 🥞 MANAGE DISH STOCK
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
        
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="glass-card p-5 rounded-3xl relative overflow-hidden"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Total Feeds</p><h3 id="stat-total" class="text-3xl font-black text-white mt-1">0</h3><i class="fa-solid fa-boxes-stacked absolute right-4 bottom-4 text-slate-800/50 text-2xl"></i></div>
            <div class="glass-card p-5 rounded-3xl relative overflow-hidden"><p class="text-[9px] font-black text-orange-400 uppercase tracking-widest">Pending Ops</p><h3 id="stat-pending" class="text-3xl font-black text-orange-500 mt-1">0</h3><i class="fa-solid fa-fire-burner absolute right-4 bottom-4 text-orange-950/20 text-2xl"></i></div>
            <div class="glass-card p-5 rounded-3xl relative overflow-hidden"><p class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Transit / Run</p><h3 id="stat-transit" class="text-3xl font-black text-blue-500 mt-1">0</h3><i class="fa-solid fa-truck-ramp-box absolute right-4 bottom-4 text-blue-950/20 text-2xl"></i></div>
            <div class="glass-card p-5 rounded-3xl relative overflow-hidden"><p class="text-[9px] font-black text-emerald-400 uppercase tracking-widest">Net Revenue</p><h3 id="stat-revenue" class="text-3xl font-black text-emerald-500 mt-1">₹0</h3><i class="fa-solid fa-indian-rupee-sign absolute right-4 bottom-4 text-emerald-950/20 text-2xl"></i></div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-6 items-center">
            <div class="relative flex items-center w-full md:max-w-md">
                <i class="fa-solid fa-magnifying-glass absolute left-4 text-slate-500 text-xs"></i>
                <input type="text" id="admin-search" onkeyup="filterOrdersEngine()" placeholder="ID, Name ya Address search karein..." class="w-full bg-slate-900/60 border border-white/5 py-3 pl-10 pr-4 text-xs text-white rounded-xl focus:outline-none focus:border-orange-500/40">
            </div>
            <div class="flex gap-2 w-full md:w-auto overflow-x-auto hide-scrollbar">
                <button onclick="setFilterStatus('all')" id="flt-all" class="bg-orange-500 text-black font-black text-xs px-4 py-2.5 rounded-xl whitespace-nowrap shadow-md transition">All Orders</button>
                <button onclick="setFilterStatus('placed')" id="flt-placed" class="bg-slate-900 border border-white/5 text-slate-400 font-bold text-xs px-4 py-2.5 rounded-xl whitespace-nowrap transition">Placed</button>
                <button onclick="setFilterStatus('cooking')" id="flt-cooking" class="bg-slate-900 border border-white/5 text-slate-400 font-bold text-xs px-4 py-2.5 rounded-xl whitespace-nowrap transition">Cooking</button>
                <button onclick="setFilterStatus('dispatched')" id="flt-dispatched" class="bg-slate-900 border border-white/5 text-slate-400 font-bold text-xs px-4 py-2.5 rounded-xl whitespace-nowrap transition">Transit</button>
                <button onclick="setFilterStatus('delivered')" id="flt-delivered" class="bg-slate-900 border border-white/5 text-slate-400 font-bold text-xs px-4 py-2.5 rounded-xl whitespace-nowrap transition">Delivered</button>
            </div>
        </div>

        <div id="admin-orders-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="delivery-modal-layer" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center hidden p-4">
        <div class="bg-slate-950 border border-white/10 w-full max-w-sm rounded-[2rem] p-6 shadow-2xl text-center">
            <div class="w-14 h-14 bg-blue-500/10 border border-blue-500/20 text-blue-400 rounded-full flex items-center justify-center text-xl mx-auto mb-4">
                <i class="fa-solid fa-motorcycle"></i>
            </div>
            <h3 class="text-sm font-black text-white uppercase tracking-wider mb-1">Assign Delivery Rider</h3>
            <p class="text-slate-500 text-[11px] mb-5">Select who is carrying this active order package.</p>
            <input type="hidden" id="pending-dispatch-order-id">
            <div class="space-y-2.5 text-left">
                <button onclick="commitDispatchWithRiderNode('Akash', '8467895365')" class="w-full bg-slate-900 hover:bg-slate-850 border border-white/5 p-3 rounded-xl flex justify-between items-center text-xs font-bold transition">
                    <span class="text-white">👦 Akash</span><span class="font-mono text-slate-400">8467895365</span>
                </button>
                <button onclick="commitDispatchWithRiderNode('Manish', '7860160456')" class="w-full bg-slate-900 hover:bg-slate-850 border border-white/5 p-3 rounded-xl flex justify-between items-center text-xs font-bold transition">
                    <span class="text-white">👦 Manish</span><span class="font-mono text-slate-400">7860160456</span>
                </button>
                <button onclick="commitDispatchWithRiderNode('Himanshu', '5566342335')" class="w-full bg-slate-900 hover:bg-slate-850 border border-white/5 p-3 rounded-xl flex justify-between items-center text-xs font-bold transition">
                    <span class="text-white">👦 Himanshu</span><span class="font-mono text-slate-400">5566342335</span>
                </button>
                <button onclick="commitDispatchWithRiderNode('Rakesh', '5522447799')" class="w-full bg-slate-900 hover:bg-slate-850 border border-white/5 p-3 rounded-xl flex justify-between items-center text-xs font-bold transition">
                    <span class="text-white">👦 Rakesh</span><span class="font-mono text-slate-400">5522447799</span>
                </button>
            </div>
            <button onclick="closeDeliveryModalNode()" class="mt-4 text-[10px] font-bold text-slate-500 hover:text-white uppercase tracking-wider">Cancel</button>
        </div>
    </div>

    <div id="stock-modal-layer" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center hidden p-4">
        <div class="bg-slate-950 border border-white/10 w-full max-w-md rounded-[2.5rem] p-6 max-h-[85vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-center border-b border-white/5 pb-3 mb-4">
                <h3 class="text-sm font-black text-orange-400 uppercase tracking-wider">Kitchen Menu Stock Toggle</h3>
                <button onclick="closeStockModalNode()" class="text-slate-400 font-bold">✕</button>
            </div>
            <div id="stock-items-list-box" class="space-y-2.5 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://secondwife-1cd1d-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        
        window.currentFilter = "all"; window.ordersCache = {};

        const fullMenu = [
            { id: 1, name: "Veg Biryani" }, { id: 2, name: "Soya Chaap Biryani" }, { id: 3, name: "Hyderabadi Dum Biryani" },
            { id: 4, name: "Special Thali" }, { id: 5, name: "Golden Thali" }, { id: 6, name: "Makhmali Malai Chaap Gravy" },
            { id: 7, name: "Mushroom Masala" }, { id: 8, name: "Matar Mushroom" }, { id: 9, name: "Malai Kofta" }, { id: 10, name: "Handi Paneer" },
            { id: 23, name: "Tandoori Roti" }, { id: 24, name: "Butter Tandoori Roti" }, { id: 27, name: "Butter Naan" },
            { id: 38, name: "Makhmali Malai Chaap" }, { id: 40, name: "Paneer Tikka" }, { id: 46, name: "Jeera Rice" }, { id: 50, name: "French Fries" }
        ];

        db.ref('orders').on('value', (snapshot) => {
            window.ordersCache = snapshot.val() || {};
            filterOrdersEngine();
            evaluateIncomingOrdersAlarmStateNode();
        });

        window.filterOrdersEngine = function() {
            const grid = document.getElementById('admin-orders-grid'); grid.innerHTML = "";
            const query = document.getElementById('admin-search').value.toLowerCase().trim();
            let total = 0, pending = 0, transit = 0, revenue = 0;

            Object.keys(window.ordersCache).sort((a, b) => window.ordersCache[b].timestamp - window.ordersCache[a].timestamp).forEach(id => {
                const order = window.ordersCache[id]; total++;
                if (order.status === 'placed' || order.status === 'cooking') pending++;
                if (order.status === 'dispatched') transit++;
                if (order.status === 'delivered') revenue += parseInt(order.total || 0);

                const statusMatches = window.currentFilter === 'all' || order.status === window.currentFilter;
                const queryMatches = order.id.toLowerCase().includes(query) || (order.custName || '').toLowerCase().includes(query) || (order.custLoc || '').toLowerCase().includes(query);

                if (statusMatches && queryMatches) {
                    let sColor = "border-amber-500/30 text-amber-400 bg-amber-500/5";
                    let emergencyClass = "";
                    let neonDotHeader = "";
                    
                    if(order.status === 'placed') {
                        sColor = "border-red-500/50 text-red-400 bg-red-500/10";
                        emergencyClass = "kitchen-red-beacon";
                        neonDotHeader = `<span class="red-dot-beacon mr-2"></span>`;
                    } else if(order.status === 'cooking') {
                        sColor = "border-orange-500/30 text-orange-400 bg-orange-500/5";
                    } else if(order.status === 'dispatched') {
                        sColor = "border-blue-500/30 text-blue-400 bg-blue-500/5";
                    } else if(order.status === 'delivered') {
                        sColor = "border-emerald-500/30 text-emerald-400 bg-emerald-500/5";
                    }

                    let riderInfoLineNode = (order.status === 'dispatched' && order.riderName) ? `<p class="text-blue-400 font-bold text-[11px] mt-1"><i class="fa-solid fa-motorcycle"></i> Rider: ${order.riderName} (${order.riderPhone})</p>` : '';

                    // LIVE DYNAMIC QUICK-REPLY CHAT COMPONENT INSIDE THE GRID INJECTOR
                    let adminChatBoxMarkupNode = "";
                    if(order.status === 'dispatched') {
                        let chatBubbleGlowClass = order.lastCustomerMsg ? "incoming-msg-radar-glow" : "bg-slate-900/60";
                        let chatContentLineNode = order.lastCustomerMsg ? 
                            `<span class="text-blue-400 animate-pulse font-black">✉️ Customer: "${order.lastCustomerMsg}"</span>` : 
                            (order.lastRiderReply ? `<span class="text-slate-500">Replied: "${order.lastRiderReply}"</span>` : `<span class="text-slate-600">No active messages...</span>`);

                        adminChatBoxMarkupNode = `
                            <div class="mt-4 border-t border-white/5 pt-3 ${chatBubbleGlowClass} p-3 rounded-2xl text-left transition-all duration-300">
                                <p class="text-[8px] font-black text-slate-400 uppercase tracking-wider mb-2"><i class="fa-solid fa-comments"></i> Rider & Customer Chat Stream:</p>
                                <div class="text-[11px] font-bold mb-2.5 leading-tight">${chatContentLineNode}</div>
                                ${order.lastCustomerMsg ? `
                                <div class="flex gap-1.5 overflow-x-auto hide-scrollbar pb-0.5">
                                    <button onclick="sendRiderReplyNode('${order.id}', 'On the way, boss!')" class="bg-slate-950 border border-white/10 hover:border-blue-500 text-slate-300 text-[9px] font-bold px-2 py-1.5 rounded-lg whitespace-nowrap">On my way!</button>
                                    <button onclick="sendRiderReplyNode('${order.id}', 'Reached your location')" class="bg-slate-950 border border-white/10 hover:border-blue-500 text-slate-300 text-[9px] font-bold px-2 py-1.5 rounded-lg whitespace-nowrap">Reached</button>
                                    <button onclick="sendRiderReplyNode('${order.id}', 'Stuck in traffic')" class="bg-slate-950 border border-white/10 hover:border-blue-500 text-slate-300 text-[9px] font-bold px-2 py-1.5 rounded-lg whitespace-nowrap">Traffic Jam</button>
                                    <button onclick="sendRiderReplyNode('${order.id}', 'Order delivered')" class="bg-slate-950 border border-white/10 hover:border-blue-500 text-slate-300 text-[9px] font-bold px-2 py-1.5 rounded-lg whitespace-nowrap">Delivered</button>
                                </div>` : ''}
                            </div>
                        `;
                    }

                    // GENERATE DYNAMIC GOOGLE MAPS NAVIGATION DECK Short-link
                    let adminMapsRouteMarkupNode = "";
                    if(order.custType === 'Delivery' && order.lat && order.lng) {
                        adminMapsRouteMarkupNode = `
                            <div class="mt-3">
                                <a href="https://www.google.com/maps/dir/?api=1&destination=${order.lat},${order.lng}" target="_blank" class="w-full bg-blue-500/10 hover:bg-blue-500 hover:text-black border border-blue-500/30 dynamic-map-btn-neon py-2 rounded-xl text-[10px] font-black tracking-wide uppercase flex items-center justify-center gap-1.5 transition-all duration-200">
                                    <i class="fa-solid fa-map-location-dot text-xs"></i> 📍 Open Live Route Map
                                </a>
                            </div>
                        `;
                    }

                    grid.innerHTML += `
                        <div class="glass-card ${emergencyClass} p-6 rounded-[2rem] flex flex-col justify-between border border-white/[0.04] transition duration-300 transform hover:-translate-y-1 shadow-2xl relative">
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <div class="flex items-center">${neonDotHeader}<h4 class="text-base font-black text-white tracking-tight">${order.id}</h4></div>
                                    <span class="text-[10px] font-extrabold px-3 py-1.5 rounded-xl uppercase border ${sColor}">${order.status}</span>
                                </div>
                                <div class="bg-black/20 border border-white/[0.02] p-3.5 rounded-2xl mb-4 space-y-1.5 text-xs text-left">
                                    <p class="text-slate-400"><b>👤 Name:</b> <span class="text-white font-bold">${order.custName || 'N/A'}</span></p>
                                    <p class="text-slate-400"><b>📞 Phone:</b> <a href="tel:${order.custPhone}" class="text-blue-400 underline font-bold font-mono">${order.custPhone || 'N/A'}</a></p>
                                    <p class="text-slate-400"><b>📦 Type:</b> <span class="text-orange-400 font-black uppercase text-[10px]">${order.custType || 'DineIn'}</span></p>
                                    <p class="text-slate-400"><b>📍 Table/Addr:</b> <span class="text-amber-400 font-semibold text-[11px] block mt-0.5 leading-relaxed">${order.custLoc || 'N/A'}</span></p>
                                    ${order.prepTime && order.prepTime !== 0 ? `<p class="text-orange-400 font-bold">⏱️ Est Time Assigned: ${order.prepTime} mins</p>` : ''}
                                    ${riderInfoLineNode}
                                </div>
                                <div class="bg-slate-950/60 p-3 rounded-xl text-xs font-bold text-slate-200 mb-4 whitespace-pre-line leading-relaxed">${order.items}</div>
                                ${adminMapsRouteMarkupNode}
                                ${adminChatBoxMarkupNode}
                            </div>
                            <div class="border-t border-white/[0.04] pt-4 space-y-3">
                                <div class="flex justify-between items-center"><span class="text-[10px] font-black text-slate-500 uppercase">Total Invoice:</span><span class="text-2xl font-black text-orange-500 brand-font">₹${order.total}</span></div>
                                
                                <div class="grid grid-cols-2 gap-2 text-[10px] font-black uppercase">
                                    <button onclick="updateStatusNode('${order.id}', 'cooking', 15)" class="py-2 rounded-xl border border-orange-500/20 bg-orange-500/10 text-orange-400 transition hover:bg-orange-500 hover:text-black">Accept (15m)</button>
                                    <button onclick="updateStatusNode('${order.id}', 'cooking', 25)" class="py-2 rounded-xl border border-amber-500/20 bg-amber-500/10 text-amber-400 transition hover:bg-amber-500 hover:text-black">Accept (25m)</button>
                                    <button onclick="triggerRiderAllocationModalNode('${order.id}')" class="py-2 rounded-xl border border-blue-500/20 bg-blue-500/10 text-blue-400 transition hover:bg-blue-500 hover:text-black col-span-1">Out For Delivery</button>
                                    <button onclick="initiateSecureOTPVerificationNode('${order.id}', '${order.secureOrderOTPDisplayNode || ''}', '${order.custType || ''}')" class="py-2 rounded-xl border border-emerald-500/20 bg-emerald-500/10 text-emerald-400 transition hover:bg-emerald-500 hover:text-black col-span-1">Delivered ✓</button>
                                </div>
                                <button onclick="if(confirm('Delete order?')) db.ref('orders/${order.id}').remove()" class="w-full bg-red-500/10 text-red-400 border border-red-500/20 py-1.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 transition hover:bg-red-500 hover:text-black"><i class="fa-solid fa-trash-can"></i> Archive Order Node</button>
                            </div>
                        </div>
                    `;
                }
            });

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-pending').innerText = pending;
            document.getElementById('stat-transit').innerText = transit;
            document.getElementById('stat-revenue').innerText = "₹" + revenue;
        }

        window.updateStatusNode = function(id, statusState, prepTimeVal) {
            db.ref('orders/' + id).update({ status: statusState, prepTime: prepTimeVal });
        }

        window.triggerRiderAllocationModalNode = function(id) {
            document.getElementById('pending-dispatch-order-id').value = id;
            document.getElementById('delivery-modal-layer').classList.remove('hidden');
        }
        window.closeDeliveryModalNode = function() { document.getElementById('delivery-modal-layer').classList.add('hidden'); }

        window.commitDispatchWithRiderNode = function(riderName, riderPhone) {
            const id = document.getElementById('pending-dispatch-order-id').value;
            db.ref('orders/' + id).update({ status: 'dispatched', riderName: riderName, riderPhone: riderPhone }).then(() => {
                closeDeliveryModalNode();
            });
        }

        window.setFilterStatus = function(status) {
            window.currentFilter = status;
            document.querySelectorAll('[id^="flt-"]').forEach(btn => { btn.className = "bg-slate-900 border border-white/5 text-slate-400 font-bold text-xs px-4 py-2.5 rounded-xl whitespace-nowrap"; });
            document.getElementById('flt-' + status).className = "bg-orange-500 text-black font-black text-xs px-4 py-2.5 rounded-xl whitespace-nowrap shadow-md";
            filterOrdersEngine();
        }

        window.openStockModalNode = function() {
            document.getElementById('stock-modal-layer').classList.remove('hidden');
            const container = document.getElementById('stock-items-list-box');
            db.ref('menu_stock').once('value').then(snap => {
                const stock = snap.val() || {}; container.innerHTML = "";
                fullMenu.forEach(item => {
                    const isAvailable = stock[item.id] !== false;
                    container.innerHTML += `
                        <div class="bg-slate-900 border border-white/5 p-3 rounded-xl flex justify-between items-center mb-2">
                            <span class="text-xs font-bold text-slate-200">${item.name}</span>
                            <button onclick="toggleItemStockNode(${item.id}, ${isAvailable})" class="text-[10px] font-black uppercase px-3 py-1.5 rounded-lg border ${isAvailable ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-red-500/10 border-red-500/30 text-red-400'}">
                                ${isAvailable ? '🟢 IN STOCK' : '🔴 OUT OF STOCK'}
                            </button>
                        </div>
                    `;
                });
            });
        }
        window.toggleItemStockNode = function(id, currentStatus) { db.ref('menu_stock/' + id).set(!currentStatus).then(() => openStockModalNode()); }
        window.closeStockModalNode = function() { document.getElementById('stock-modal-layer').classList.add('hidden'); }

        function evaluateIncomingOrdersAlarmStateNode() {
            const bellNode = document.getElementById('kitchen-alert-bell');
            if(!bellNode) return;
            let hasNewUnacceptedOrderNode = Object.keys(window.ordersCache).some(id => window.ordersCache[id].status === 'placed');
            if(hasNewUnacceptedOrderNode) {
                bellNode.play().catch(() => { console.log("Dashboard engine alert triggered."); });
            } else {
                bellNode.pause();
                bellNode.currentTime = 0;
            }
        }

        const kitchenGestureTriggersNode = ['click', 'touchstart'];
        kitchenGestureTriggersNode.forEach(evt => {
            document.addEventListener(evt, function bypassKitchenAudioLockNode() {
                evaluateIncomingOrdersAlarmStateNode();
                kitchenGestureTriggersNode.forEach(e => document.removeEventListener(e, bypassKitchenAudioLockNode));
            }, { passive: true });
        });

        // LIVE QUICK CHAT RIDER TRANSMISSION REPLIES ENGINE
        window.sendRiderReplyNode = function(orderId, replyTextString) {
            db.ref('orders/' + orderId).update({
                lastCustomerMsg: null, // Clear customer's message query on active reply strike
                lastRiderReply: replyTextString
            });
        }
    </script>

    <div id="secure-otp-popup-modal-layer" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[110] flex items-center justify-center hidden p-4">
        <div class="glass-card-popup w-full max-w-sm rounded-[2.2rem] p-6 text-center shadow-2xl animate-in fade-in zoom-in duration-200">
            <div class="w-14 h-14 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center text-xl mx-auto mb-4">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h3 class="text-base font-black text-white uppercase tracking-wider mb-1">Verify Delivery OTP</h3>
            <p class="text-slate-400 text-xs mb-5">Customer se 4-digit code pooch kar input karein.</p>
            
            <input type="hidden" id="secure-verification-target-order-id">
            <input type="hidden" id="secure-verification-target-raw-otp">

            <input type="text" id="secure-admin-otp-input-field" maxlength="4" placeholder="••••" class="w-full bg-slate-950/80 border border-white/10 rounded-xl py-3.5 text-center text-2xl font-mono font-black tracking-[0.4em] text-orange-500 focus:outline-none focus:border-orange-500 mb-4 placeholder-slate-800">
            
            <div class="grid grid-cols-2 gap-2.5">
                <button onclick="closeSecureOTPModalNode()" class="bg-slate-900 border border-white/5 py-3 rounded-xl text-xs font-black text-slate-400 hover:text-white uppercase transition tracking-wider">Cancel</button>
                <button onclick="validateAndCommitSecureDeliveryNode()" class="bg-gradient-to-r from-emerald-500 to-green-600 py-3 rounded-xl text-xs font-black text-black uppercase transition tracking-wider shadow-md active:scale-95">Verify Code</button>
            </div>
        </div>
    </div>

    <script>
        // Trigger verification pop-up module workflow logic
        window.initiateSecureOTPVerificationNode = function(orderId, exactDbOtpString, orderTypeString) {
            // Bypass logic for DineIn orders so staff never get stuck on tables processing
            if(orderTypeString === 'DineIn') {
                if(confirm('Clear this Dine-In order node?')) {
                    window.updateStatusNode(orderId, 'delivered', 0);
                }
                return;
            }

            // Fallback safety if database connectivity drops out or otp fields fail to cache 
            if(!exactDbOtpString || exactDbOtpString.trim() === "") {
                if(confirm("Warning: Security code parameter offline. Proceed bypass?")) {
                    window.updateStatusNode(orderId, 'delivered', 0);
                }
                return;
            }

            // Bind values directly into virtual modal hidden input elements
            document.getElementById('secure-verification-target-order-id').value = orderId;
            document.getElementById('secure-verification-target-raw-otp').value = exactDbOtpString;
            document.getElementById('secure-admin-otp-input-field').value = ""; // Refresh previous entries
            
            document.getElementById('secure-otp-popup-modal-layer').classList.remove('hidden');
            setTimeout(() => document.getElementById('secure-admin-otp-input-field').focus(), 50);
        }

        window.closeSecureOTPModalNode = function() {
            document.getElementById('secure-otp-popup-modal-layer').classList.add('hidden');
        }

        window.validateAndCommitSecureDeliveryNode = function() {
            const targetOrderId = document.getElementById('secure-verification-target-order-id').value;
            const absoluteExpectedOtp = document.getElementById('secure-verification-target-raw-otp').value.trim();
            const userEnteredOtp = document.getElementById('secure-admin-otp-input-field').value.trim();

            if(userEnteredOtp === absoluteExpectedOtp) {
                // If code checks out cleanly, execute transmission update to clear loop node
                window.updateStatusNode(targetOrderId, 'delivered', 0);
                window.closeSecureOTPModalNode();
            } else {
                alert("❌ Wrong Security Code! Fraud risk detected. Please verify with customer again.");
                document.getElementById('secure-admin-otp-input-field').value = "";
                document.getElementById('secure-admin-otp-input-field').focus();
            }
        }
    </script>
</body>
</html>
