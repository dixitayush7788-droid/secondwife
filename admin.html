<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECOND WIFE | Kitchen Dashboard (Full Sync)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Playfair+Display+SC:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .brand-font { font-family: 'Playfair Display SC', serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-[#030712] text-slate-100 min-h-screen antialiased pb-24">

    <header class="sticky top-0 z-50 bg-[#030712]/90 backdrop-blur-md border-b border-white/[0.05] px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 shadow-xl">
        <div class="flex flex-col">
            <h1 class="brand-font text-white text-2xl font-black tracking-tight">Second Wife</h1>
            <span class="text-[9px] font-black text-orange-500 uppercase tracking-widest mt-1">Kitchen Command Center</span>
        </div>
        <div class="flex gap-2">
            <button onclick="openStockModalNode()" class="bg-gradient-to-r from-orange-500 to-red-600 text-black font-extrabold text-xs px-4 py-2.5 rounded-xl flex items-center gap-2 transition active:scale-95 shadow-lg">
                <i class="fa-solid fa-layer-group"></i> 🥞 MANAGE DISH STOCK
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
        
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="glass-card p-5 rounded-3xl relative overflow-hidden"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Total Feeds</p><h3 id="stat-total" class="text-3xl font-black text-white mt-1">0</h3></div>
            <div class="glass-card p-5 rounded-3xl relative overflow-hidden"><p class="text-[9px] font-black text-orange-400 uppercase tracking-widest">Pending Ops</p><h3 id="stat-pending" class="text-3xl font-black text-orange-500 mt-1">0</h3></div>
            <div class="glass-card p-5 rounded-3xl relative overflow-hidden"><p class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Transit / Run</p><h3 id="stat-transit" class="text-3xl font-black text-blue-500 mt-1">0</h3></div>
            <div class="glass-card p-5 rounded-3xl relative overflow-hidden"><p class="text-[9px] font-black text-emerald-400 uppercase tracking-widest">Net Revenue</p><h3 id="stat-revenue" class="text-3xl font-black text-emerald-500 mt-1">₹0</h3></div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-6 items-center">
            <div class="relative flex items-center w-full md:max-w-md">
                <i class="fa-solid fa-magnifying-glass absolute left-4 text-slate-500 text-xs"></i>
                <input type="text" id="admin-search" onkeyup="filterOrdersEngine()" placeholder="Search via ID, Name or Location..." class="w-full bg-slate-900/60 border border-white/5 py-3 pl-10 pr-4 text-xs text-white rounded-xl focus:outline-none focus:border-orange-500/40">
            </div>
            <div class="flex gap-2 w-full md:w-auto overflow-x-auto hide-scrollbar">
                <button onclick="setFilterStatus('all')" id="flt-all" class="bg-orange-500 text-black font-black text-xs px-4 py-2.5 rounded-xl whitespace-nowrap shadow-md">All Orders</button>
                <button onclick="setFilterStatus('placed')" id="flt-placed" class="bg-slate-900 border border-white/5 text-slate-400 font-bold text-xs px-4 py-2.5 rounded-xl whitespace-nowrap">Placed</button>
                <button onclick="setFilterStatus('cooking')" id="flt-cooking" class="bg-slate-900 border border-white/5 text-slate-400 font-bold text-xs px-4 py-2.5 rounded-xl whitespace-nowrap">Cooking</button>
                <button onclick="setFilterStatus('dispatched')" id="flt-dispatched" class="bg-slate-900 border border-white/5 text-slate-400 font-bold text-xs px-4 py-2.5 rounded-xl whitespace-nowrap">Transit</button>
                <button onclick="setFilterStatus('delivered')" id="flt-delivered" class="bg-slate-900 border border-white/5 text-slate-400 font-bold text-xs px-4 py-2.5 rounded-xl whitespace-nowrap">Delivered</button>
            </div>
        </div>

        <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-2"><i class="fa-solid fa-list-check text-orange-500"></i> Active Production Queue</h2>
        <div id="admin-orders-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="stock-modal-layer" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center hidden p-4">
        <div class="bg-slate-950 border border-white/10 w-full max-w-md rounded-[2.5rem] p-6 max-h-[85vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-center border-b border-white/5 pb-3 mb-4">
                <h3 class="text-sm font-black text-orange-400 uppercase tracking-wider">Kitchen Menu Stock Toggle</h3>
                <button onclick="closeStockModalNode()" class="text-slate-400 font-bold">✕</button>
            </div>
            <div id="stock-items-list-box" class="space-y-2.5 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://secondwife-1cd1d-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        
        window.currentFilter = "all"; window.ordersCache = {};

        const fullMenu = [
            { id: 1, name: "Veg Biryani" }, { id: 2, name: "Soya Chaap Biryani" }, { id: 3, name: "Hyderabadi Dum Biryani" },
            { id: 4, name: "Special Thali" }, { id: 5, name: "Golden Thali" }, { id: 6, name: "Makhmali Malai Chaap Gravy" },
            { id: 7, name: "Mushroom Masala" }, { id: 8, name: "Matar Mushroom" }, { id: 9, name: "Malai Kofta" }, { id: 10, name: "Handi Paneer" },
            { id: 23, name: "Tandoori Roti" }, { id: 24, name: "Butter Tandoori Roti" }, { id: 27, name: "Butter Naan" },
            { id: 38, name: "Makhmali Malai Chaap" }, { id: 40, name: "Paneer Tikka" }, { id: 46, name: "Jeera Rice" }, { id: 50, name: "French Fries" }
        ];

        db.ref('orders').on('value', (snapshot) => {
            window.ordersCache = snapshot.val() || {};
            filterOrdersEngine();
        });

        window.filterOrdersEngine = function() {
            const grid = document.getElementById('admin-orders-grid'); grid.innerHTML = "";
            const query = document.getElementById('admin-search').value.toLowerCase().trim();
            
            let total = 0, pending = 0, transit = 0, revenue = 0;

            Object.keys(window.ordersCache).sort((a, b) => window.ordersCache[b].timestamp - window.ordersCache[a].timestamp).forEach(id => {
                const order = window.ordersCache[id];
                total++;
                if (order.status === 'placed' || order.status === 'cooking') pending++;
                if (order.status === 'dispatched') transit++;
                if (order.status === 'delivered') revenue += parseInt(order.total || 0);

                // Filter Criteria Matches
                const statusMatches = window.currentFilter === 'all' || order.status === window.currentFilter;
                const queryMatches = order.id.toLowerCase().includes(query) || 
                                     (order.custName || '').toLowerCase().includes(query) || 
                                     (order.custLoc || '').toLowerCase().includes(query);

                if (statusMatches && queryMatches) {
                    let sColor = "border-amber-500/30 text-amber-400 bg-amber-500/5";
                    if(order.status === 'cooking') sColor = "border-orange-500/30 text-orange-400 bg-orange-500/5";
                    if(order.status === 'dispatched') sColor = "border-blue-500/30 text-blue-400 bg-blue-500/5";
                    if(order.status === 'delivered') sColor = "border-emerald-500/30 text-emerald-400 bg-emerald-500/5";

                    grid.innerHTML += `
                        <div class="glass-card p-6 rounded-[2rem] flex flex-col justify-between border border-white/[0.04]">
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <div><h4 class="text-base font-black text-white">${order.id}</h4></div>
                                    <span class="text-[10px] font-extrabold px-3 py-1.5 rounded-xl uppercase border ${sColor}">${order.status}</span>
                                </div>
                                <div class="bg-black/20 border border-white/[0.02] p-3.5 rounded-2xl mb-4 space-y-1.5 text-xs text-left">
                                    <p class="text-slate-400"><b>👤 Name:</b> <span class="text-white font-bold">${order.custName || 'N/A'}</span></p>
                                    <p class="text-slate-400"><b>📞 Phone:</b> <a href="tel:${order.custPhone}" class="text-blue-400 underline font-bold">${order.custPhone || 'N/A'}</a></p>
                                    <p class="text-slate-400"><b>📦 Type:</b> <span class="text-orange-400 font-black uppercase text-[10px]">${order.custType || 'DineIn'}</span></p>
                                    <p class="text-slate-400"><b>📍 Table/Addr:</b> <span class="text-amber-400 font-semibold">${order.custLoc || 'N/A'}</span></p>
                                </div>
                                <div class="bg-slate-950/60 p-3 rounded-xl text-xs font-bold text-slate-200 mb-4 whitespace-pre-line">${order.items}</div>
                            </div>
                            <div class="border-t border-white/[0.04] pt-4 space-y-3">
                                <div class="flex justify-between items-center"><span class="text-[10px] font-black text-slate-500 uppercase">Total Invoice:</span><span class="text-2xl font-black text-orange-500 brand-font">₹${order.total}</span></div>
                                <div class="flex gap-2">
                                    <select onchange="db.ref('orders/${order.id}').update({status:this.value})" class="bg-slate-900 border border-white/10 text-white font-bold text-xs rounded-xl px-3 py-2.5 w-full focus:outline-none">
                                        <option value="placed" ${order.status==='placed'?'selected':''}>Placed</option>
                                        <option value="cooking" ${order.status==='cooking'?'selected':''}>Cooking</option>
                                        <option value="dispatched" ${order.status==='dispatched'?'selected':''}>Dispatched</option>
                                        <option value="delivered" ${order.status==='delivered'?'selected':''}>Delivered</option>
                                    </select>
                                    <button onclick="if(confirm('Delete order?')) db.ref('orders/${order.id}').remove()" class="bg-red-500/10 text-red-400 border border-red-500/20 px-3.5 rounded-xl"><i class="fa-solid fa-trash-can text-xs"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-pending').innerText = pending;
            document.getElementById('stat-transit').innerText = transit;
            document.getElementById('stat-revenue').innerText = "₹" + revenue;
        }

        window.setFilterStatus = function(status) {
            window.currentFilter = status;
            document.querySelectorAll('[id^="flt-"]').forEach(btn => {
                btn.className = "bg-slate-900 border border-white/5 text-slate-400 font-bold text-xs px-4 py-2.5 rounded-xl whitespace-nowrap";
            });
            document.getElementById('flt-' + status).className = "bg-orange-500 text-black font-black text-xs px-4 py-2.5 rounded-xl whitespace-nowrap shadow-md";
            filterOrdersEngine();
        }

        window.openStockModalNode = function() {
            document.getElementById('stock-modal-layer').classList.remove('hidden');
            const container = document.getElementById('stock-items-list-box');
            db.ref('menu_stock').once('value').then(snap => {
                const stock = snap.val() || {}; container.innerHTML = "";
                fullMenu.forEach(item => {
                    const isAvailable = stock[item.id] !== false;
                    container.innerHTML += `
                        <div class="bg-slate-900 border border-white/5 p-3 rounded-xl flex justify-between items-center mb-2">
                            <span class="text-xs font-bold text-slate-200">${item.name}</span>
                            <button onclick="toggleItemStockNode(${item.id}, ${isAvailable})" class="text-[10px] font-black uppercase px-3 py-1.5 rounded-lg border ${isAvailable ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-red-500/10 border-red-500/30 text-red-400'}">
                                ${isAvailable ? '🟢 IN STOCK' : '🔴 OUT OF STOCK'}
                            </button>
                        </div>
                    `;
                });
            });
        }

        window.toggleItemStockNode = function(id, currentStatus) { db.ref('menu_stock/' + id).set(!currentStatus).then(() => openStockModalNode()); }
        window.closeStockModalNode = function() { document.getElementById('stock-modal-layer').classList.add('hidden'); }
    </script>
</body>
</html>
