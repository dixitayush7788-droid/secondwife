<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECOND WIFE | Admin Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#020617] text-slate-100 min-h-screen p-6">

    <header class="max-w-4xl mx-auto flex justify-between items-center border-b border-white/5 pb-5 mb-8">
        <div>
            <h1 class="text-2xl font-black text-orange-500 tracking-tight">KITCHEN ADMIN DASHBOARD</h1>
            <p class="text-xs text-slate-400 mt-1">Second Wife Cafe Realtime Incoming Tracker Pipeline Node</p>
        </div>
        <div class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 font-bold text-xs px-4 py-2 rounded-xl animate-pulse flex items-center gap-2">
            <div class="h-2 w-2 rounded-full bg-emerald-400"></div> LIVE DATABASE CONNECTED
        </div>
    </header>

    <main class="max-w-4xl mx-auto space-y-4" id="admin-orders-feed">
        <div class="text-center text-slate-500 text-sm py-12" id="empty-state-msg">
            <i class="fa-solid fa-spinner animate-spin text-xl text-orange-500 mb-3 block"></i>
            Waiting for live orders from database node...
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://secondwife-1cd1d-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let standardKnownOrderCount = 0;

        // Listen to overall database nodes pipeline stream
        onValue(ref(db, 'orders'), (snapshot) => {
            const data = snapshot.val();
            const feed = document.getElementById('admin-orders-feed');
            
            if(!data) {
                feed.innerHTML = `<div class="text-center text-slate-500 py-12">No active database records logged yet.</div>`;
                return;
            }

            document.getElementById('empty-state-msg').style.display = 'none';
            feed.innerHTML = ""; // Clear UI panel cache array

            // Sort incoming entries logically sequentially backwards
            const sortedIds = Object.keys(data).sort((a,b) => data[b].timestamp - data[a].timestamp);
            
            // Sound trigger alerting mechanism framework check
            if(sortedIds.length > standardKnownOrderCount && standardKnownOrderCount !== 0) {
                playAlertSoundNotification();
            }
            standardKnownOrderCount = sortedIds.length;

            sortedIds.forEach(id => {
                const order = data[id];
                
                let statusBadgeStyle = "bg-amber-500/10 border-amber-500/20 text-amber-400";
                if(order.status === 'cooking') statusBadgeStyle = "bg-orange-500/10 border-orange-500/20 text-orange-400";
                if(order.status === 'dispatched') statusBadgeStyle = "bg-blue-500/10 border-blue-500/20 text-blue-400";
                if(order.status === 'delivered') statusBadgeStyle = "bg-emerald-500/10 border-emerald-500/20 text-emerald-400 opacity-40";

                feed.innerHTML += `
                    <div class="bg-slate-900/60 border border-white/5 rounded-2xl p-5 flex flex-col md:flex-between gap-4 transition hover:border-white/10">
                        <div class="flex justify-between items-start border-b border-white/5 pb-3">
                            <div>
                                <span class="text-xs font-black text-slate-500">ORDER REFF ID</span>
                                <h3 class="text-base font-black text-white tracking-wide mt-0.5">${order.id}</h3>
                            </div>
                            <span class="text-[10px] font-black uppercase px-3 py-1 rounded-lg border ${statusBadgeStyle}">${order.status}</span>
                        </div>
                        
                        <div class="py-2">
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Dishes List Loaded:</p>
                            <p class="text-sm font-semibold text-white mt-1 bg-slate-950 p-3 rounded-xl border border-white/[0.03]">${order.items}</p>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 text-xs font-bold text-slate-400 bg-slate-950/40 p-3 rounded-xl">
                            <div>Total Payable: <span class="text-orange-500 font-extrabold text-sm block mt-0.5">₹${order.total}</span></div>
                            <div>Method: <span class="text-white block mt-1">${order.payment}</span></div>
                            <div class="col-span-2 md:col-span-1">UTR Link Reference: <span class="text-slate-300 block font-mono mt-1 text-[11px] truncate">${order.utr}</span></div>
                        </div>

                        <div class="grid grid-cols-2 lg:grid-cols-4 gap-2.5 mt-2">
                            <button onclick="updateOrderStatus('${order.id}', 'cooking', 20)" class="bg-orange-500 text-black font-extrabold text-xs py-3 rounded-xl hover:bg-orange-600 transition">Accept (20m)</button>
                            <button onclick="updateOrderStatus('${order.id}', 'cooking', 45)" class="bg-amber-500 text-black font-extrabold text-xs py-3 rounded-xl hover:bg-amber-600 transition">Accept (45m)</button>
                            <button onclick="updateOrderStatus('${order.id}', 'dispatched', 0)" class="bg-blue-600 text-white font-extrabold text-xs py-3 rounded-xl hover:bg-blue-700 transition">Out For Delivery</button>
                            <button onclick="updateOrderStatus('${order.id}', 'delivered', 0)" class="bg-emerald-600 text-white font-extrabold text-xs py-3 rounded-xl hover:bg-emerald-700 transition">Delivered ✓</button>
                        </div>
                    </div>
                `;
            });
        });

        window.updateOrderStatus = function(id, nextStatus, timerMins) {
            update(ref(db, 'orders/' + id), {
                status: nextStatus,
                prepTime: timerMins
            }).then(() => console.log(`Order reference ${id} successfully mutated node step value.`));
        }

        function playAlertSoundNotification() {
            // Synthetic Browser Web Audio synth oscillator engine fallback sequence (No file required)
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(880, ctx.currentTime); // High pitched clean bell note reference
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.35);
            } catch(e) { console.log(e); }
        }
    </script>
</body>
</html>
