<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Second Wife Menu</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body style="background:#111; color:#fff; padding:20px;">
    <h1>Second Wife Menu</h1>
    <div id="item" style="border:1px solid #444; padding:10px; margin-top:10px;">
        Veg Biryani - ₹199
        <button onclick="document.getElementById('form').style.display='block'" style="background:orange; padding:5px 10px; cursor:pointer;">Order</button>
    </div>

    <div id="form" style="display:none; margin-top:20px; background:#222; padding:20px;">
        <input id="name" placeholder="Naam" style="width:100%; color:#000; padding:10px; margin-bottom:10px;"><br>
        <input id="phone" placeholder="Mobile" style="width:100%; color:#000; padding:10px; margin-bottom:10px;"><br>
        <input id="loc" placeholder="Address" style="width:100%; color:#000; padding:10px; margin-bottom:10px;"><br>
        <button onclick="placeOrder()" style="background:green; color:white; padding:10px; width:100%;">PLACE ORDER</button>
    </div>

    <script>
        const db = firebase.initializeApp({ databaseURL: "https://secondwife-1cd1d-default-rtdb.firebaseio.com/" }).database();
        
        window.placeOrder = function() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const loc = document.getElementById('loc').value;
            if(!name || phone.length < 10) { alert("Details sahi bharo!"); return; }

            db.ref('order_counter').transaction((c) => (c || 0) + 1).then((res) => {
                const id = "SW-" + String(res.snapshot.val()).padStart(6, '0');
                db.ref('orders/' + id).set({
                    id, custName: name, custPhone: phone, custLoc: loc,
                    items: "Veg Biryani", total: 199, status: "placed", timestamp: Date.now()
                }).then(() => {
                    alert("Order Success!");
                    location.reload();
                });
            });
        }
    </script>
</body>
</html>
