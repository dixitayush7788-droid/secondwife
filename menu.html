<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Second Wife Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-4">
    <div id="app">
        <h1 class="text-xl font-bold mb-4">Veg Biryani - ₹199</h1>
        <button onclick="document.getElementById('checkout').classList.remove('hidden')" class="bg-green-600 p-3 w-full rounded">Checkout</button>
    </div>

    <div id="checkout" class="hidden fixed inset-0 bg-gray-900 p-4">
        <input id="name" placeholder="Naam" class="w-full p-2 mb-2 bg-black rounded">
        <input id="phone" placeholder="Mobile" class="w-full p-2 mb-2 bg-black rounded">
        <input id="addr" placeholder="Address" class="w-full p-2 mb-2 bg-black rounded">
        <button onclick="placeOrder()" class="w-full bg-orange-500 p-3 rounded">PLACE ORDER</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({ databaseURL: "https://secondwife-1cd1d-default-rtdb.firebaseio.com/" }).database();
        
        window.placeOrder = function() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const addr = document.getElementById('addr').value;
            if(!name || phone.length < 10) return alert("Details bharo!");

            db.ref('order_counter').transaction((c) => (c || 0) + 1).then((res) => {
                const id = "SW-" + String(res.snapshot.val()).padStart(6, '0');
                db.ref('orders/' + id).set({
                    id, custName: name, custPhone: phone, custLoc: addr,
                    items: "Veg Biryani", total: 199, status: "placed", timestamp: Date.now()
                }).then(() => alert("Order Success!"));
            });
        }
    </script>
</body>
</html>
