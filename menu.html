<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>SECOND WIFE — Café & Restaurant, Kanpur</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root {
            --bg: #030712;
            --glass: rgba(15, 23, 42, 0.45);
            --glass-border: rgba(255, 255, 255, 0.07);
            --neon-orange: #f97316;
            --neon-orange-dim: rgba(249, 115, 22, 0.18);
            --neon-orange-glow: 0 4px 20px rgba(249, 115, 22, 0.35);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --card-bg: rgba(15, 23, 42, 0.6);
            --radius: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; padding-bottom: 120px; }
        
        .bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .drift-node { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.6; }
        .drift-node.a { width: 600px; height: 600px; background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, transparent 70%); top: -150px; left: -150px; animation: driftA 20s ease-in-out infinite alternate; }
        .drift-node.b { width: 500px; height: 500px; background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%); bottom: -100px; right: -100px; animation: driftB 25s ease-in-out infinite alternate; }
        @keyframes driftA { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(100px, 50px) scale(1.1); } }
        @keyframes driftB { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-80px, -100px) scale(1.15); } }
        
        .app-wrap { position: relative; z-index: 2; max-width: 650px; margin: 0 auto; padding: 0 16px; }
        .hero { text-align: center; padding: 40px 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .hero-brand { font-family: 'Playfair Display SC', serif; font-size: 36px; font-weight: 900; background: linear-gradient(135deg, #fff, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Category Slider Styling Core Matrix */
        .search-wrap { position: sticky; top: 0; z-index: 50; padding: 14px 0; background: linear-gradient(180deg, var(--bg) 80%, transparent); }
        #searchInput { width: 100%; padding: 14px 16px 14px 44px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 14px; backdrop-filter: blur(20px); color: #fff; font-size: 13px; outline: none; transition: all var(--transition); }
        #searchInput:focus { border-color: var(--neon-orange); box-shadow: var(--neon-orange-glow); }
        
        .filter-scroll { overflow-x: auto; white-space: nowrap; padding: 6px 0 14px; scrollbar-width: none; flex-direction: row; display: flex; gap: 8px; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-pill { padding: 10px 18px; border-radius: 100px; background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-secondary); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; whitespace-nowrap: true; }
        .filter-pill.active { background: var(--neon-orange); border-color: var(--neon-orange); color: #000; font-weight: 800; box-shadow: var(--neon-orange-glow); }
        
        /* Dynamic Rendered Menu Card Grids */
        .menu-section { margin-bottom: 28px; }
        .section-header { display: flex; align-items: center; justify-between: true; gap: 10px; padding: 12px 0; }
        .section-title { font-family: 'Playfair Display SC', serif; font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.5px; text-transform: uppercase; }
        .section-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(249,115,22,0.25), transparent); }
        
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .menu-card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 16px; display: flex; justify-content: space-between; align-items: center; transition: all var(--transition); }
        .menu-card:hover { border-color: rgba(249,115,22,0.3); transform: translateY(-1px); }
        .menu-card.out-of-stock { opacity: 0.35; pointer-events: none; }
        
        .qty-wrap { display: flex; align-items: center; gap: 2px; }
        .qty-btn { width: 34px; height: 34px; border: none; background: var(--neon-orange); color: #000; font-weight: 800; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
        .qty-counter { min-width: 30px; text-align: center; font-size: 14px; font-weight: 800; color: #fff; }
        .qty-minus { display: none; background: var(--neon-orange-dim); color: var(--neon-orange); }
        .qty-wrap.active .qty-minus { display: flex; }
        
        /* History & Checkout Sheets Modules */
        #liveTracker { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(3,7,18,0.95); border-top: 1px solid rgba(249,115,22,0.3); backdrop-filter: blur(20px); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); max-width: 650px; margin: 0 auto; border-radius: 20px 20px 0 0; }
        #liveTracker.visible { transform: translateY(0); }
