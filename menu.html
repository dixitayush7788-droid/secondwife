<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Second Wife Cafe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://secondwife-1cd1d-default-rtdb.firebaseio.com/" }));
        window.db = db; window.ref = ref; window.set = set; window.runTransaction = runTransaction;
    </script>
</head>
<body class="bg-gray-900 text-white p-4">
    <div id="store-front-view">
        <h1 class="text-2xl font-bold">Second Wife Menu</h1>
        <div id="biryani-container"></div>
        <button onclick="document.getElementById('checkout-bar').classList.remove('translate-y-full')" class="bg-green-500 p-4 w-full mt-4">Checkout</button>
    </div>

    <div id="checkout-bar" class="fixed bottom-0 left-0 right-0 p-5 bg-gray-800 translate-y-full transition-transform">
        <input type="text" id="cust-input-name" placeholder="Naam" class="w-full p-2 mb-2 bg-black rounded">
        <input type="tel" id="cust-input-phone" placeholder="Mobile" class="w-full p-2 mb-2 bg-black rounded">
        <input type="text" id="cust-input-location" placeholder="Address/Table" class="w-full p-2 mb-2 bg-black rounded">
        <button onclick="sendOrder()" class="w-full bg-orange-500 p-3 rounded font-bold">PLACE ORDER</button>
    </div>

    <script>
        window.cart = { 1: { name: "Veg Biryani", price: 199, qty: 1 } };
        window.sendOrder = function() {
            const nameVal = document.getElementById('cust-input-name').value;
            const phoneVal = document.getElementById('cust-input-phone').value;
            const locVal = document.getElementById('cust-input-location').value;
            
            if(!nameVal || phoneVal.length < 10) { alert("Details sahi bharo!"); return; }

            runTransaction(window.ref(window.db, 'order_counter'), (curr) => (curr || 0) + 1).then((res) => {
                const orderId = "SW-" + String(res.snapshot.val()).padStart(6, '0');
                window.set(window.ref(window.db, 'orders/' + orderId), {
                    id: orderId, custName: nameVal, custPhone: phoneVal, custLoc: locVal,
                    items: "Veg Biryani", total: 199, status: "placed", timestamp: Date.now()
                }).then(() => { alert("Order Success!"); location.reload(); });
            });
        }
    </script>
</body>
</html>
