<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECOND WIFE Cafe & Restaurant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Playfair+Display+SC:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .brand-font { font-family: 'Playfair Display SC', serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .active-pill { background: linear-gradient(135deg, #f97316, #ea580c); color: #000000; font-weight: 800; }
    </style>
</head>
<body class="bg-[#030712] text-slate-100 antialiased overflow-x-hidden">

    <div id="store-front-view">
        <div class="bg-gradient-to-r from-[#2c1d11] via-[#f97316] to-[#1e293b] text-white text-[10px] font-extrabold tracking-[0.2em] py-2 text-center uppercase shadow-2xl">
            ⚡ Elite Taste Destination • Shyam Nagar, Kanpur
        </div>

        <nav class="sticky top-0 z-50 bg-slate-950/90 border-b border-white/[0.04] px-6 py-4 flex justify-between items-center backdrop-blur-md">
            <div>
                <span class="brand-font text-white text-xl font-black tracking-tight block">Second Wife</span>
                <span class="text-[8px] font-black text-blue-500 uppercase tracking-widest block mt-0.5">Café & Restaurant</span>
            </div>
            <div onclick="openCartDrawer()" class="relative bg-white/[0.02] border border-white/5 p-3 rounded-xl cursor-pointer">
                <i class="fa-solid fa-basket-shopping text-orange-500 text-lg"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-500 text-black text-[9px] font-black h-4 w-4 rounded-full flex items-center justify-center hidden">0</span>
            </div>
        </nav>

        <div class="sticky top-[65px] z-40 bg-slate-950/80 border-b border-white/[0.02] py-2.5 px-4 overflow-x-auto hide-scrollbar flex gap-2">
            <button onclick="scrollToSection('sec-biryani', this)" class="category-pill active-pill px-3 py-2 rounded-xl text-xs whitespace-nowrap">🍲 Biryani</button>
            <button onclick="scrollToSection('sec-thali', this)" class="category-pill bg-slate-900/40 text-slate-400 px-3 py-2 rounded-xl text-xs whitespace-nowrap">🍽️ Thali</button>
            <button onclick="scrollToSection('sec-main', this)" class="category-pill bg-slate-900/40 text-slate-400 px-3 py-2 rounded-xl text-xs whitespace-nowrap"> Dum Aloo</button>
            <button onclick="scrollToSection('sec-breads', this)" class="category-pill bg-slate-900/40 text-slate-400 px-3 py-2 rounded-xl text-xs whitespace-nowrap">🫓 Breads</button>
            <button onclick="scrollToSection('sec-snacks', this)" class="category-pill bg-slate-900/40 text-slate-400 px-3 py-2 rounded-xl text-xs whitespace-nowrap">🍟 Snacks</button>
        </div>

        <div class="max-w-md mx-auto px-4 mt-6">
            <div class="relative flex items-center">
                <i class="fa-solid fa-magnifying-glass absolute left-4 text-slate-500 text-xs"></i>
                <input type="text" id="search-bar" onkeyup="searchDish()" placeholder="Dish ka naam dhoondein..." class="w-full bg-slate-900/50 border border-white/5 rounded-xl py-3 pl-10 pr-4 text-xs text-white focus:outline-none focus:border-orange-500">
            </div>
        </div>

        <div class="max-w-md mx-auto px-4 mt-6 pb-48 space-y-6">
            <section id="sec-biryani"><h2 class="text-[10px] font-black text-orange-400 tracking-wider uppercase mb-3">🍲 Biryani Specials</h2><div id="biryani-box" class="grid gap-3"></div></section>
            <section id="sec-thali"><h2 class="text-[10px] font-black text-orange-400 tracking-wider uppercase mb-3">🍽️ Premium Thali Menu</h2><div id="thali-box" class="grid gap-3"></div></section>
            <section id="sec-main"><h2 class="text-[10px] font-black text-orange-400 tracking-wider uppercase mb-3">🍛 Main Course & Sabji</h2><div id="main-box" class="grid gap-3"></div></section>
            <section id="sec-breads"><h2 class="text-[10px] font-black text-orange-400 tracking-wider uppercase mb-3">🫓 Tandoori Breads</h2><div id="breads-box" class="grid gap-3"></div></section>
            <section id="sec-snacks"><h2 class="text-[10px] font-black text-orange-400 tracking-wider uppercase mb-3">🍟 Snacks & Kulcha</h2><div id="snacks-box" class="grid gap-3"></div></section>
        </div>
    </div>

    <div id="checkout-bar" class="fixed inset-x-0 bottom-0 bg-slate-950 border-t border-white/10 p-5 rounded-t-3xl transform translate-y-full transition-transform duration-300 z-50 max-w-md mx-auto">
        <div class="flex justify-between items-center mb-3 border-b border-white/5 pb-2">
            <span class="text-[10px] font-black text-orange-400 uppercase">Review Basket</span>
            <button onclick="closeCartDrawer()" class="text-slate-400">✕</button>
        </div>
        
        <div class="bg-slate-900/80 border border-white/5 p-4 rounded-2xl mb-4 space-y-3 text-left">
            <p class="text-[9px] font-black text-orange-400 uppercase tracking-widest">Customer Details Required:</p>
            <input type="text" id="cust-name" onkeyup="validateFormState()" placeholder="Aapka Naam..." class="w-full bg-slate-950 border border-white/10 p-3 rounded-xl text-xs text-white focus:outline-none focus:border-orange-500 font-semibold">
            <input type="tel" id="cust-phone" maxlength="10" onkeyup="validateFormState()" placeholder="10-Digit Mobile Number..." class="w-full bg-slate-950 border border-white/10 p-3 rounded-xl text-xs text-white focus:outline-none focus:border-orange-500 font-mono font-bold">
            <input type="text" id="cust-loc" onkeyup="validateFormState()" placeholder="Table Number ya Delivery Address..." class="w-full bg-slate-950 border border-white/10 p-3 rounded-xl text-xs text-white focus:outline-none focus:border-orange-500 font-semibold">
        </div>

        <div class="flex justify-between items-center mb-4 px-1">
            <p id="summary-text" class="text-xs text-slate-400">0 Items Selected</p>
            <p id="summary-total" class="text-2xl font-black text-orange-500">₹0</p>
        </div>

        <button id="checkout-btn" onclick="fireOrderPipeline()" class="w-full bg-slate-800 text-slate-500 py-4 rounded-xl font-black text-xs cursor-not-allowed opacity-40" disabled>PLACE ORDER</button>
    </div>

    <script>
        const fullMenu = [
            { id: 1, cat: "biryani", name: "Veg Biryani", price: 199 },
            { id: 2, cat: "biryani", name: "Soya Chaap Biryani", price: 229 },
            { id: 3, cat: "biryani", name: "Hyderabadi Dum Biryani", price: 230 },
            { id: 4, cat: "thali", name: "Special Thali", price: 260 },
            { id: 5, cat: "thali", name: "Golden Thali", price: 299 },
            { id: 6, cat: "main", name: "Makhmali Malai Chaap Gravy", price: 289 },
            { id: 7, cat: "main", name: "Mushroom Masala", price: 179 },
            { id: 10, cat: "main", name: "Handi Paneer", price: 179 },
            { id: 12, cat: "main", name: "Dum Aloo", price: 269 },
            { id: 23, cat: "breads", name: "Tandoori Roti", price: 12 },
            { id: 24, cat: "breads", name: "Butter Tandoori Roti", price: 14 },
            { id: 27, cat: "breads", name: "Butter Naan", price: 45 },
            { id: 50, cat: "snacks", name: "French Fries", price: 139 },
            { id: 53, cat: "snacks", name: "Stuffed Paneer Kulcha", price: 79 }
        ];

        const db = firebase.initializeApp({ databaseURL: "https://secondwife-1cd1d-default-rtdb.firebaseio.com/" }).database();
        window.cart = {};

        function renderInterfaceMenuRoom() {
            ['biryani', 'thali', 'main', 'breads', 'snacks'].forEach(c => {
                const box = document.getElementById(`${c}-box`); if(box) box.innerHTML = "";
            });
            fullMenu.forEach(item => {
                const container = document.getElementById(`${item.cat}-box`); if(!container) return;
                container.innerHTML += `
                    <div class="dish-card bg-slate-900/60 border border-white/5 p-4 rounded-2xl flex justify-between items-center" data-name="${item.name.toLowerCase()}">
                        <div>
                            <h3 class="font-bold text-slate-200 text-xs">${item.name}</h3>
                            <p class="text-orange-500 font-black text-xs mt-0.5">₹${item.price}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="changeQty(${item.id},-1)" id="m-${item.id}" class="w-7 h-7 bg-slate-800 rounded-lg hidden text-xs font-bold">-</button>
                            <span id="q-${item.id}" class="font-black text-xs hidden">0</span>
                            <button onclick="changeQty(${item.id},1)" class="w-8 h-8 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-lg font-bold text-xs">+</button>
                        </div>
                    </div>
                `;
            });
        }

        window.changeQty = function(id, delta) {
            const item = fullMenu.find(i => i.id === id); if(!window.cart[id]) window.cart[id] = { name:item.name, price:item.price, qty:0 };
            window.cart[id].qty += delta; if(window.cart[id].qty <= 0) delete window.cart[id];
            
            const qTxt = document.getElementById(`q-${id}`); const mBtn = document.getElementById(`m-${id}`);
            const current = window.cart[id] ? window.cart[id].qty : 0;
            if(qTxt && mBtn) { if(current>0){ qTxt.innerText=current; qTxt.classList.remove('hidden'); mBtn.classList.remove('hidden'); }else{ qTxt.classList.add('hidden'); mBtn.classList.add('hidden'); } }
            
            let tItems = 0; let tPrice = 0; Object.keys(window.cart).forEach(k => { tItems+=window.cart[k].qty; tPrice+=(window.cart[k].price*window.cart[k].qty); });
            const badge = document.getElementById('cart-count');
            if(tItems>0) { badge.innerText=tItems; badge.classList.remove('hidden'); document.getElementById('summary-text').innerText=`${tItems} Dishes Selected`; document.getElementById('summary-total').innerText=`₹${tPrice}`; }
            else { badge.classList.add('hidden'); document.getElementById('checkout-bar').classList.add('translate-y-full'); }
            validateFormState();
        }

        window.validateFormState = function() {
            const btn = document.getElementById('checkout-btn'); const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim(); const loc = document.getElementById('cust-loc').value.trim();
            if(name.length>=2 && phone.length===10 && loc.length>=1 && Object.keys(window.cart).length>0) { btn.disabled=false; btn.className="w-full bg-gradient-to-r from-emerald-500 to-green-600 text-black py-4 rounded-xl font-black text-xs cursor-pointer shadow-lg"; }
            else { btn.disabled=true; btn.className="w-full bg-slate-800 text-slate-500 py-4 rounded-xl font-black text-xs cursor-not-allowed opacity-40"; }
        }

        window.fireOrderPipeline = function() {
            const n = document.getElementById('cust-name').value.trim(); const p = document.getElementById('cust-phone').value.trim(); const l = document.getElementById('cust-loc').value.trim();
            let itemsStr = ""; let tPrice=0; Object.keys(window.cart).forEach(k=>{ itemsStr+=`${window.cart[k].name} (x${window.cart[k].qty}), `; tPrice+=(window.cart[k].price*window.cart[k].qty); });
            
            db.ref('order_counter').transaction(c=>(c||0)+1).then(res=>{
                if(res.committed) {
                    const id = "SW-"+String(res.snapshot.val()).padStart(6,'0');
                    db.ref('orders/'+id).set({ id, items:itemsStr, total:tPrice, payment:"COD", utr:"COD_MODE", status:"placed", prepTime:0, custName:n, custPhone:p, custType:"DineIn", custLoc:l, timestamp:Date.now() }).then(()=>{
                        alert(`🎉 Order Success! Order ID: ${id}`); window.location.reload();
                    });
                }
            });
        }

        window.openCartDrawer = function() { if(Object.keys(window.cart).length>0) document.getElementById('checkout-bar').classList.remove('translate-y-full'); }
        window.closeCartDrawer = function() { document.getElementById('checkout-bar').classList.add('translate-y-full'); }
        window.scrollToSection = function(id, el) { const t=document.getElementById(id); if(t) window.scrollTo({top:t.getBoundingClientRect().top+window.scrollY-120, behavior:'smooth'}); document.querySelectorAll('.category-pill').forEach(p=>p.className="category-pill bg-slate-900/40 text-slate-400 px-3 py-2 rounded-xl text-xs whitespace-nowrap"); el.className="category-pill active-pill px-3 py-2 rounded-xl text-xs whitespace-nowrap"; }
        window.searchDish = function() { const input=document.getElementById('search-bar').value.toLowerCase().trim(); const cards=document.getElementsByClassName('dish-card'); for(let i=0;i<cards.length;i++) cards[i].style.display=cards[i].getAttribute('data-name').includes(input)?"flex":"none"; }

        window.onload = renderInterfaceMenuRoom;
    </script>
</body>
</html>
