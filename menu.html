<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECOND WIFE Cafe & Restaurant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-[#030712] text-slate-100 p-4 font-['Plus_Jakarta_Sans']">

    <header class="text-center py-6">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-500">SECOND WIFE</h1>
        <p class="text-[10px] uppercase tracking-widest text-slate-400 mt-1">Café & Restaurant • Shyam Nagar, Kanpur</p>
    </header>

    <main class="max-w-md mx-auto space-y-3 pb-32" id="menu-cards-loop-box"></main>

    <div id="basket-strip" class="fixed bottom-0 inset-x-0 bg-slate-950/95 border-t border-white/10 p-4 rounded-t-3xl shadow-2xl max-w-md mx-auto">
        
        <div class="space-y-2.5 mb-4">
            <p class="text-[10px] font-black text-orange-400 uppercase tracking-wider"><i class="fa-solid fa-user-pen"></i> Enter Customer Identity Info:</p>
            <input type="text" id="c-name" onkeyup="checkFieldsFormValidation()" placeholder="Aapka Naam (Your Name)..." class="w-full bg-slate-900 border border-white/5 p-3 rounded-xl text-xs text-white focus:outline-none">
            <input type="tel" id="c-phone" maxlength="10" onkeyup="checkFieldsFormValidation()" placeholder="10-Digit Mobile Number..." class="w-full bg-slate-900 border border-white/5 p-3 rounded-xl text-xs text-white focus:outline-none font-mono">
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="toggleServiceModeTypeNode('DineIn')" id="btn-dine" class="bg-orange-500 text-black font-black text-xs py-2.5 rounded-xl transition">🍽️ Dine-In / Table</button>
                <button onclick="toggleServiceModeTypeNode('Delivery')" id="btn-delv" class="bg-slate-900 border border-white/5 text-slate-400 font-bold text-xs py-2.5 rounded-xl transition">🚀 Home Delivery</button>
            </div>

            <div id="gps-utilities-container" class="hidden flex justify-between items-center pt-1 gap-2">
                <button onclick="triggerDeviceNativeGPSCoordinatesNode(this)" class="bg-blue-500/10 border border-blue-500/20 text-blue-400 font-bold text-[10px] px-3 py-2 rounded-xl transition"><i class="fa-solid fa-location-crosshairs animate-pulse"></i> 📍 Use Current Location</button>
                <button id="pill-prev-addr" onclick="usePreviousSavedMemoryAddressNode()" class="hidden bg-orange-500/10 border border-orange-500/20 text-orange-400 font-black text-[10px] px-3 py-2 rounded-xl truncate max-w-[180px]"><i class="fa-solid fa-clock-rotate-left"></i> 🕒 Purana Address use karein</button>
            </div>
            <input type="text" id="c-loc" onkeyup="checkFieldsFormValidation()" placeholder="Table Number daalein..." class="w-full bg-slate-900 border border-white/5 p-3 rounded-xl text-xs text-white focus:outline-none">
        </div>

        <div class="flex justify-between items-center mb-3">
            <span class="text-xs font-bold text-slate-400" id="basket-count-summary">1 Item selected (Veg Biryani)</span>
            <span class="text-2xl font-black text-orange-500">₹199</span>
        </div>
        <button id="realize-order-btn" onclick="transmitCloudOrderPipeline()" class="w-full bg-slate-800 text-slate-500 py-4 rounded-xl font-black text-xs cursor-not-allowed opacity-50" disabled>
            <i class="fa-solid fa-fire text-sm mr-1"></i> REALIZE REALTIME CLOUD ORDER
        </button>
    </div>

    <script>
        const fullMenu = [
            { id: 1, cat: "🍲 Biryani", name: "Veg Biryani", price: 199 },
            { id: 2, cat: "🍲 Biryani", name: "Soya Chaap Biryani", price: 229 },
            { id: 3, cat: "🍲 Biryani", name: "Hyderabadi Dum Biryani", price: 230 },
            { id: 4, cat: "🍽️ Thali Menu", name: "Special Thali", price: 260 },
            { id: 5, cat: "🍽️ Thali Menu", name: "Golden Thali", price: 299 },
            { id: 6, cat: "🍛 Main Course", name: "Makhmali Malai Chaap Gravy", price: 289 },
            { id: 7, cat: "🍛 Main Course", name: "Mushroom Masala", price: 179 },
            { id: 10, cat: "🍛 Main Course", name: "Handi Paneer", price: 179 },
            { id: 23, cat: "🫓 Breads", name: "Tandoori Roti", price: 12 },
            { id: 24, cat: "🫓 Breads", name: "Butter Tandoori Roti", price: 14 },
            { id: 27, cat: "🫓 Breads", name: "Butter Naan", price: 45 },
            { id: 38, cat: "🍢 Starters", name: "Makhmali Malai Chaap", price: 279 },
            { id: 40, cat: "🍢 Starters", name: "Paneer Tikka", price: 269 },
            { id: 46, cat: "🍚 Rice", name: "Jeera Rice", price: 99 },
            { id: 50, cat: "🍟 Snacks", name: "French Fries", price: 139 }
        ];

        const db = firebase.initializeApp({ databaseURL: "https://secondwife-1cd1d-default-rtdb.firebaseio.com/" }).database();
        window.activeServiceModeNode = "DineIn";

        function renderMenuEngine() {
            const loopBox = document.getElementById('menu-cards-loop-box');
            loopBox.innerHTML = "";
            fullMenu.forEach(item => {
                loopBox.innerHTML += `
                    <div class="bg-slate-900 border border-white/[0.02] p-4 rounded-2xl flex justify-between items-center shadow-md">
                        <div>
                            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-wider block">${item.cat}</span>
                            <h3 class="font-bold text-slate-200 text-sm mt-0.5">${item.name}</h3>
                            <p class="text-orange-500 font-black text-xs mt-1">₹${item.price}</p>
                        </div>
                        <button class="bg-gradient-to-br from-orange-500 to-red-600 text-white font-black text-xs h-9 w-9 rounded-xl shadow-md flex items-center justify-center"><i class="fa-solid fa-plus"></i></button>
                    </div>
                `;
            });
        }

        window.toggleServiceModeTypeNode = function(mode) {
            window.activeServiceModeNode = mode;
            const dineBtn = document.getElementById('btn-dine'); const delvBtn = document.getElementById('btn-delv');
            const locInput = document.getElementById('c-loc'); const gpsSuite = document.getElementById('gps-utilities-container');
            
            if(mode === 'DineIn') {
                dineBtn.className = "bg-orange-500 text-black font-black text-xs py-2.5 rounded-xl transition";
                delvBtn.className = "bg-slate-900 border border-white/5 text-slate-400 font-bold text-xs py-2.5 rounded-xl transition";
                locInput.placeholder = "Table Number daalein..."; gpsSuite.classList.add('hidden');
            } else {
                delvBtn.className = "bg-orange-500 text-black font-black text-xs py-2.5 rounded-xl transition";
                dineBtn.className = "bg-slate-900 border border-white/5 text-slate-400 font-bold text-xs py-2.5 rounded-xl transition";
                locInput.placeholder = "Full Home Delivery Address daalein..."; gpsSuite.classList.remove('hidden');
                
                const cachedMemoryAddress = localStorage.getItem('sw_cached_delivery_address');
                if(cachedMemoryAddress) {
                    const pill = document.getElementById('pill-prev-addr');
                    pill.classList.remove('hidden'); pill.title = cachedMemoryAddress;
                }
            }
            locInput.value = ""; window.checkFieldsFormValidation();
        }

        window.triggerDeviceNativeGPSCoordinatesNode = function(btn) {
            if(!navigator.geolocation) return alert("GPS not running on this phone architecture browser node.");
            const oldTxt = btn.innerHTML; btn.innerHTML = "<i class='fa-solid fa-circle-notch animate-spin'></i> Tracking Location...";
            
            navigator.geolocation.getCurrentPosition(async (position) => {
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}`);
                    const data = await response.json();
                    document.getElementById('c-loc').value = data.display_name || "Kanpur Location Captured ✓";
                } catch(e) { document.getElementById('c-loc').value = `GPS Coords: ${position.coords.latitude.toFixed(4)}, ${position.coords.longitude.toFixed(4)}`; }
                btn.innerHTML = oldTxt; window.checkFieldsFormValidation();
            }, () => { alert("GPS Access Denied. Type manually inside address box."); btn.innerHTML = oldTxt; }, { enableHighAccuracy: true });
        }

        window.usePreviousSavedMemoryAddressNode = function() {
            document.getElementById('c-loc').value = localStorage.getItem('sw_cached_delivery_address');
            window.checkFieldsFormValidation();
        }

        window.checkFieldsFormValidation = function() {
            const n = document.getElementById('c-name').value.trim();
            const p = document.getElementById('c-phone').value.trim();
            const l = document.getElementById('c-loc').value.trim();
            const btn = document.getElementById('realize-order-btn');
            
            if(n.length >= 2 && p.length === 10 && l.length >= 1) {
                btn.disabled = false;
                btn.className = "w-full bg-gradient-to-r from-emerald-500 to-green-600 text-black py-4 rounded-xl font-black text-xs tracking-wider cursor-pointer shadow-lg";
            } else {
                btn.disabled = true;
                btn.className = "w-full bg-slate-800 text-slate-500 py-4 rounded-xl font-black text-xs cursor-not-allowed opacity-50";
            }
        }

        window.transmitCloudOrderPipeline = function() {
            const name = document.getElementById('c-name').value.trim();
            const phone = document.getElementById('c-phone').value.trim();
            const loc = document.getElementById('c-loc').value.trim();

            db.ref('order_counter').transaction((currentValue) => (currentValue || 0) + 1).then((res) => {
                if(res.committed) {
                    const orderId = "SW-" + String(res.snapshot.val()).padStart(6, '0');
                    db.ref('orders/' + orderId).set({
                        id: orderId, items: "Veg Biryani (x1)", total: 199, payment: "COD",
                        utr: "COD_MODE", status: "placed", timestamp: Date.now(),
                        custName: name, custPhone: phone, custType: window.activeServiceModeNode, custLoc: loc
                    }).then(() => {
                        if(window.activeServiceModeNode === 'Delivery') {
                            localStorage.setItem('sw_cached_delivery_address', loc);
                        }
                        alert(`🎉 Order Successfully Sent! Order ID: ${orderId}`);
                        window.location.reload();
                    });
                }
            });
        }

        window.onload = renderMenuEngine;
    </script>
</body>
</html>
